<div class="task-groups vh-100 vw-100 d-flex align-items-center flex-column">
    <h1 class="text-white align-self-start m-3">Task Manager</h1>
    <app-task-groups
      [taskGroups]="taskGroups"
      (search)="onSearch($event)"
      (add)="addGroup($event)"
      (delete)="onDelete($event)"
      (update)="onUpdate($event)"
    />
</div>
