<div class="vh-100 vw-100 d-flex flex-column">
  <header class="m-3 text-white d-flex flex-column">
    <h1>Task Manager</h1>
    <a [routerLink]="'/tasks'">Go back to groups</a>
  </header>
  <main class="w-100 d-flex">
    <aside class="m-3">
      <app-task-form (addTask)="addTask($event)"/>
    </aside>
    <div class="tasks-list">
      <app-task-list [tasks]="tasks" (delete)="onDelete($event)" (update)="onUpdate($event)" (search)="onSearch($event)"/>
    </div>
  </main>
</div>
